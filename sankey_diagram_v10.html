        // --- 核心计算逻辑 ---
        function calculateLinks(nodesByDepth, linksFrom, depthA, depthB) {
            const newLinks = [];
            const nodesA = nodesByDepth[depthA];
            
            nodesA.forEach(nodeA => {
                let currentFlow = {};
                currentFlow[nodeA.name] = nodeA.uv;
                
                for (let d = depthA; d < depthB; d++) {
                    let nextFlow = {};
                    const nodesAtD = nodesByDepth[d];
                    nodesAtD.forEach(nodeX => {
                        const flowAtX = currentFlow[nodeX.name] || 0;
                        if (flowAtX > 0) {
                            const outLinks = linksFrom[nodeX.name];
                            const totalOut = outLinks.reduce((sum, l) => sum + l.value, 0);
                            outLinks.forEach(link => {
                                const proportion = totalOut > 0 ? link.value / totalOut : 0;
                                const flowToY = flowAtX * proportion;
                                nextFlow[link.target] = (nextFlow[link.target] || 0) + flowToY;
                            });
                        }
                    });
                    currentFlow = nextFlow;
                }
                
                nodesByDepth[depthB].forEach(nodeB => {
                    const val = currentFlow[nodeB.name] || 0;
                    if (val > 0) {
                        const rate = (val / nodeA.uv * 100).toFixed(2) + '%';
                        const isPositivePath = !nodeA.name.startsWith('无') && !nodeA.name.startsWith('未') &&
                                               !nodeB.name.startsWith('无') && !nodeB.name.startsWith('未');
                        newLinks.push({
                            source: nodeA.name,
                            target: nodeB.name,
                            value: Math.round(val),
                            rate: rate,
                            edgeLabel: {
                                show: isPositivePath,
                                formatter: rate,
                                color: "#000",
                                fontSize: 12,
                                fontWeight: "bold"
                            }
                        });
                    }
                });
            });
            return newLinks;
        }

        // --- 更新单个图表 ---
        function updateChart(chartIndex) {
            const chartInstance = charts[chartIndex];

            const checkboxes = document.querySelectorAll('#global-node-controls input[type="checkbox"]');
            const activeDepths = [];
            checkboxes.forEach(cb => {
                if (cb.checked) activeDepths.push(parseInt(cb.value));
            });
            
            if (activeDepths.length < 2) {
                alert("至少需要保留两个节点层级！");
                if (window.event && window.event.target) window.event.target.checked = true;
                return;
            }
            
            activeDepths.sort((a, b) => a - b);
            
            // 准备数据结构
            const nodesByDepth = [];
            for (let i = 0; i <= 4; i++) {
                nodesByDepth[i] = sourceData.nodes.filter(n => n.depth === i);
            }

            const linksFrom = {};
            sourceData.nodes.forEach(n => linksFrom[n.name] = []);
            sourceData.links.forEach(l => {
                if(linksFrom[l.source]) linksFrom[l.source].push(l);
            });
            
            // 过滤节点
            const filteredNodes = [];
            activeDepths.forEach((depth, index) => {
                nodesByDepth[depth].forEach(n => {
                    const newNode = JSON.parse(JSON.stringify(n));
                    newNode.depth = index;
                    filteredNodes.push(newNode);
                });
            });
            
            // 计算连线
            const filteredLinks = [];
            for (let i = 0; i < activeDepths.length - 1; i++) {
                const d1 = activeDepths[i];
                const d2 = activeDepths[i+1];
                const newLinks = calculateLinks(nodesByDepth, linksFrom, d1, d2);
                filteredLinks.push(...newLinks);
            }
            
            // 渲染图表
            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function(params) {
                        if (params.dataType === 'edge') {
                            return params.data.source + ' -> ' + params.data.target + '<br/>' +
                                   'UV: ' + params.data.value + '<br/>' +
                                   '转化率: ' + params.data.rate;
                        } else {
                            return params.name + '<br/>UV: ' + params.data.uv + ' (' + params.data.percent + '%)';
                        }
                    }
                },
                series: [{
                    type: 'sankey',
                    data: filteredNodes,
                    links: filteredLinks,
                    top: '5%',
                    bottom: '5%',
                    left: '5%',
                    right: '15%', // 加大右侧边距，防止最右侧节点的文字标签被截断
                    emphasis: { focus: 'adjacency' },
                    nodeAlign: 'left',
                    layoutIterations: 0,
                    lineStyle: { color: 'gradient', curveness: 0.5 },
                    label: {
                        position: 'right',
                        formatter: function(params) {
                            return params.data.name + '\n' + params.data.uv + ' (' + params.data.percent + '%)';
                        }
                    }
                }]
            };
            
            chartInstance.hideLoading();
            chartInstance.setOption(option);
        }

        // --- 联动更新所有可见图表 ---
        function updateAllCharts() {
            const viewCount = parseInt(document.querySelector('input[name="viewCount"]:checked').value);
            for (let i = 1; i <= viewCount; i++) {
                updateChart(i);
            }
        }

        // --- 切换视图数量 ---
        function changeViewCount() {
            const viewCount = parseInt(document.querySelector('input[name="viewCount"]:checked').value);
            
            // 控制 DOM 显示/隐藏
            document.getElementById('wrapper-1').style.display = viewCount >= 1 ? 'flex' : 'none';
            document.getElementById('wrapper-2').style.display = viewCount >= 2 ? 'flex' : 'none';
            document.getElementById('wrapper-3').style.display = viewCount >= 3 ? 'flex' : 'none';
            
            // 重新调整所有图表大小并更新数据
            setTimeout(() => {
                for (let i = 1; i <= 3; i++) {
                    if (viewCount >= i) {
                        charts[i].resize();
                        updateChart(i);
                    }
                }
            }, 100);
        }

        // 初始化 (默认 1 个视图)
        changeViewCount();

        // 窗口缩放自适应
        window.addEventListener('resize', function() {
            const viewCount = parseInt(document.querySelector('input[name="viewCount"]:checked').value);
            for (let i = 1; i <= viewCount; i++) {
                charts[i].resize();
            }
        });
    </script>
</body>
